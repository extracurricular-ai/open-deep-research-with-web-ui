<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Deep Research - Web UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 20px 0;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 30px;
        }

        .panel h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        input[type="text"],
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-submit:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #f0f0f0;
            color: #333;
        }

        .btn-clear:hover {
            background: #e0e0e0;
        }

        #output {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 6px;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            font-size: 0.9em;
            line-height: 1.6;
            overflow-y: auto;
            max-height: 500px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        #output.empty {
            color: #888;
            font-style: italic;
        }

        .status {
            margin-top: 15px;
            padding: 15px;
            border-radius: 6px;
            display: none;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .status.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0c5460;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .answer-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }

        .answer-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .answer-box p {
            color: #333;
            line-height: 1.6;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Open Deep Research</h1>
            <p>Web UI for AI-powered research and question answering</p>
        </header>

        <div class="main-content">
            <div class="panel">
                <h2>Input</h2>
                <form id="queryForm">
                    <div class="form-group">
                        <label for="modelSelect">Model:</label>
                        <select id="modelSelect" required>
                            <option value="o1">OpenAI o1</option>
                            <option value="gpt-4-turbo">GPT-4 Turbo</option>
                            <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                            <option value="gpt-4.1-nano">GPT-4.1 Nano</option>
                            <option value="gpt-4o-mini">GPT-4o Mini</option>
                            <option value="ollama/mistral">Ollama Mistral (Local)</option>
                            <option value="claude-3-5-sonnet-20241022">Claude 3.5 Sonnet</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="question">Question:</label>
                        <textarea
                            id="question"
                            placeholder="Enter your research question here... (e.g., 'How many studio albums did Björk release before 2005?')"
                            required
                        ></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-submit" id="submitBtn">Run Agent</button>
                        <button type="button" class="btn-clear" id="clearBtn">Clear</button>
                    </div>
                </form>

                <div id="status" class="status"></div>
            </div>

            <div class="panel">
                <h2>Output</h2>
                <div id="output" class="empty">Waiting for input...</div>
                <div id="answerBox" class="answer-box" style="display: none;">
                    <h3>Final Answer</h3>
                    <p id="answerText"></p>
                </div>
            </div>
        </div>

        <footer>
            <p>Powered by smolagents and LiteLLM</p>
        </footer>
    </div>

    <script>
        const form = document.getElementById('queryForm');
        const questionInput = document.getElementById('question');
        const modelSelect = document.getElementById('modelSelect');
        const submitBtn = document.getElementById('submitBtn');
        const clearBtn = document.getElementById('clearBtn');
        const outputDiv = document.getElementById('output');
        const statusDiv = document.getElementById('status');
        const answerBox = document.getElementById('answerBox');
        const answerText = document.getElementById('answerText');

        // Clear button
        clearBtn.addEventListener('click', () => {
            questionInput.value = '';
            outputDiv.textContent = 'Waiting for input...';
            outputDiv.classList.add('empty');
            answerBox.style.display = 'none';
            statusDiv.textContent = '';
            statusDiv.className = 'status';
        });

        // Form submission with streaming
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const question = questionInput.value.trim();
            const modelId = modelSelect.value;

            if (!question) {
                showStatus('Please enter a question', 'error');
                return;
            }

            // Clear previous output
            outputDiv.textContent = '';
            outputDiv.classList.remove('empty');
            answerBox.style.display = 'none';
            submitBtn.disabled = true;

            showStatus('Running agent... This may take a moment.', 'loading');

            try {
                const response = await fetch('/api/run/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        question: question,
                        model_id: modelId,
                    }),
                });

                if (!response.ok) {
                    const error = await response.json();
                    showStatus(`Error: ${error.error}`, 'error');
                    submitBtn.disabled = false;
                    return;
                }

                // Stream the response
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();

                    if (done) {
                        showStatus('✓ Completed successfully!', 'success');
                        break;
                    }

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');

                    // Process complete lines
                    for (let i = 0; i < lines.length - 1; i++) {
                        const line = lines[i];
                        if (line.startsWith('data: ')) {
                            const jsonStr = line.slice(6);
                            try {
                                const jsonData = JSON.parse(jsonStr);

                                if (jsonData.done) {
                                    // Extract final answer if present
                                    const finalAnswerMatch = outputDiv.textContent.match(
                                        /✓ Final Answer: ([\s\S]*?)$/
                                    );
                                    if (finalAnswerMatch) {
                                        answerText.textContent = finalAnswerMatch[1].trim();
                                        answerBox.style.display = 'block';
                                    }
                                } else if (jsonData.text) {
                                    // Append the text to output
                                    outputDiv.textContent += jsonData.text;
                                    outputDiv.classList.remove('empty');
                                    // Auto-scroll to bottom
                                    outputDiv.scrollTop = outputDiv.scrollHeight;
                                }
                            } catch (e) {
                                console.error('Failed to parse:', jsonStr, e);
                            }
                        }
                    }

                    // Keep the last incomplete line in the buffer
                    buffer = lines[lines.length - 1];
                }
            } catch (error) {
                outputDiv.textContent = `Client Error: ${error.message}`;
                showStatus(`Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
            }
        });

        function showStatus(message, type) {
            statusDiv.className = `status ${type}`;
            if (type === 'loading') {
                statusDiv.innerHTML = `<span class="spinner"></span> ${message}`;
            } else {
                statusDiv.textContent = message;
            }
        }
    </script>
</body>
</html>
